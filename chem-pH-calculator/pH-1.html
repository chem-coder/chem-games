<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pH Calculator</title>
</head>
<body>
    <h2>Select an Acid</h2>
    <form>
        <label for="acid-select">Choose an acid:</label>
        <select id="acid-select" name="acid">
            <option value="">--Select an Acid--</option>
            <option value="HCl">Hydrochloric Acid (HCl)</option>
            <option value="H2SO4">Sulfuric Acid (H₂SO₄)</option>
            <option value="HNO3">Nitric Acid (HNO₃)</option>
            <option value="CH3COOH">Acetic Acid (CH₃COOH)</option>
            <option value="H3PO4">Phosphoric Acid (H₃PO₄)</option>
            <option value="HF">Hydrofluoric Acid (HF)</option>
            <!-- Add more acids as needed -->
        </select>
    </form>
</body>
</html>
