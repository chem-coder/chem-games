<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>pH Calculator</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<h1>pH Calculator</h1>
	<p>Calculate the pH of a monoprotic strong acid.</p>
	<div class="data">
		<label for="SA-conc">Acid Concentration: </label>
		<input class="conc" id="SA-conc" type="text" name="" placeholder="concentration" >
		<span class="M">M</span>			
	</div>
	<button type="button" id="calculate-pH">Calculate pH</button>
	<p id="pH-output"></p>


	<script type="text/javascript" src="script.js"></script>
</body>
</html>
