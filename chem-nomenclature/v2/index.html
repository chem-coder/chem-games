<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Inorganic Chemical Nomenclature App</title>
	<link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
	<header></header>
	<main>
		<h1>Chemical Elements Nomenclature App</h1>
		<p>Please enter a valid chemical symbol or name (letters only):</p>
		<form id="form-element">
			<input id="input" type="text" value="" autocomplete="off">
			<ul id="suggestions"></ul>
		</form>
		<button id="btn">Name</button>
		<p id="output"></p>
	</main>
	<footer></footer>
	<script type="text/javascript" src="script.js"></script>
</body>
</html>
