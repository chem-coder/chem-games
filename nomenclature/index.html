<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyatomic Ion Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="../shared/css/tokens.css">
  <link rel="stylesheet" href="css/styles.css?v=20260625-hg">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <a class="home-link" href="../">&larr; Home</a>
      <p class="eyebrow">Nomenclature &middot; Polyatomic Ions</p>
      <h1>Polyatomic Ion Trainer</h1>
      <p class="lede">The three things you have to connect for every ion: its <strong>formula</strong>, its <strong>name</strong>, and its <strong>charge</strong>. Study the set, then drill a short stack — get a card fully right and it leaves; miss any part and it comes back around.</p>
    </header>

    <div id="deckSwitcher" class="deck-switcher" aria-label="Choose an ion set"></div>

    <section id="game" class="game" aria-live="polite"></section>
  </main>

  <!-- Cache-busting lives HERE, in ONE place per game. Every JS module resolves through this map to
       its ?v= URL, so the .js files stay version-free (no cross-file drift — the bug this replaced).
       Bump the token on each deploy: one find-replace of the date-tag in this file. Keys are
       document-relative, so it works on any base path (localhost or GitHub Pages /chem-games/). -->
  <script type="importmap">
  {
    "imports": {
      "./js/triad.js":       "./js/triad.js?v=20260625-hg",
      "./js/chem.js":        "./js/chem.js?v=20260625-hg",
      "./js/matching.js":    "./js/matching.js?v=20260625-hg",
      "./js/storage.js":     "./js/storage.js?v=20260625-hg",
      "./data/ion-decks.js": "./data/ion-decks.js?v=20260625-hg",
      "./data/ions.js":      "./data/ions.js?v=20260625-hg"
    }
  }
  </script>
  <script type="module" src="js/app.js?v=20260625-hg"></script>
</body>
</html>
